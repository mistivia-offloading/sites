function randName() {
    const randomIndex1 = Math.floor(Math.random() * words.adjectives.length);
    const part1 = words.adjectives[randomIndex1];
    const randomIndex2 = Math.floor(Math.random() * words.nouns.length);
    const part2 = words.nouns[randomIndex2];
    return part1 + part2;
}


    function fnv1a64(str) {
        const FNV_OFFSET_BASIS = BigInt("14695981039346656037");
        const FNV_PRIME = BigInt("1099511628211");
        let hash = FNV_OFFSET_BASIS;
        for (let i = 0; i < str.length; i++) {
            hash ^= BigInt(str.charCodeAt(i));
            hash = (hash * FNV_PRIME) & BigInt("0xFFFFFFFFFFFFFFFF");
        }
        return hash.toString(16).padStart(16, "0");
    }

    function randomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }
    var popup = function() {}

    async function getHash(message) {
        const algorithm = 'SHA-256'
        const encoder = new TextEncoder();
        const data = encoder.encode(message);
        const hashBuffer = await crypto.subtle.digest(algorithm, data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray
            .map(b => b.toString(16).padStart(2, '0'))
            .join('');
        return hashHex;
    }
